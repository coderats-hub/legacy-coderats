name: CodeRats Azure CI/CD

on:
  push:
    branches:
      - main
      - development
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-coderats-dev' }}
  AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME || 'crcoderatsdevgug01' }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'ca-coderats-dev-backend' }}
  BACKEND_IMAGE_NAME: coderats-backend

jobs:
  backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Define image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            env_tag="prod"
          elif [[ "${GITHUB_REF_NAME}" == "development" ]]; then
            env_tag="dev"
          else
            env_tag="staging"
          fi

          echo "tag=${env_tag}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "alias=${env_tag}" >> "$GITHUB_OUTPUT"

      - name: Resolve ACR login server
        id: acr
        shell: bash
        run: |
          set -euo pipefail
          login_server="$(az acr show \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_ACR_NAME}" \
            --query loginServer \
            --output tsv)"
          echo "login_server=${login_server}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        shell: bash
        env:
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          set -euo pipefail
          echo "${ACR_PASSWORD}" | docker login "${{ steps.acr.outputs.login_server }}" -u "${AZURE_ACR_NAME}" --password-stdin

      - name: Build and push backend image
        id: image
        shell: bash
        run: |
          set -euo pipefail

          image="${{ steps.acr.outputs.login_server }}/${BACKEND_IMAGE_NAME}:${{ steps.meta.outputs.tag }}"
          alias_image="${{ steps.acr.outputs.login_server }}/${BACKEND_IMAGE_NAME}:${{ steps.meta.outputs.alias }}"

          docker build \
            -f Codigo/apps/backend/Dockerfile \
            -t "${image}" \
            -t "${alias_image}" \
            Codigo/apps/backend

          docker push "${image}"
          docker push "${alias_image}"

          echo "image=${image}" >> "$GITHUB_OUTPUT"

  start-postgres:
    name: Start PostgreSQL for Deploy
    needs: backend
    if: github.ref_name == 'main' || github.ref_name == 'development' || startsWith(github.ref, 'refs/heads/feature/')
    uses: ./.github/workflows/azure-postgres-scheduler.yml
    with:
      action: start
      keep_running_minutes: 120
    secrets: inherit

  deploy-backend:
    name: Deploy Backend to Azure Container Apps
    runs-on: ubuntu-latest
    needs:
      - backend
      - start-postgres
    if: github.ref_name == 'main' || github.ref_name == 'development' || startsWith(github.ref, 'refs/heads/feature/')
    env:
      DB_PASS: ${{ secrets.DB_PASS }}
      SECURITY_JWT_SECRET: ${{ secrets.SECURITY_JWT_SECRET }}
      OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in DB_PASS SECURITY_JWT_SECRET OAUTH_CLIENT_SECRET OPENAI_API_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Configure Container App secrets
        shell: bash
        run: |
          set -euo pipefail

          az containerapp secret set \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --secrets \
              db-pass="${DB_PASS}" \
              security-jwt-secret="${SECURITY_JWT_SECRET}" \
              github-oauth-client-secret="${OAUTH_CLIENT_SECRET}" \
              openai-api-key="${OPENAI_API_KEY}" \
            --output none

      - name: Deploy image to Container App
        shell: bash
        run: |
          set -euo pipefail

          az containerapp update \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --image "${{ needs.backend.outputs.image }}" \
            --set-env-vars \
              DB_PASS=secretref:db-pass \
              SECURITY_JWT_SECRET=secretref:security-jwt-secret \
              OAUTH_CLIENT_SECRET_DEV=secretref:github-oauth-client-secret \
              OAUTH_CLIENT_SECRET_PROD=secretref:github-oauth-client-secret \
              OPENAI_API_KEY=secretref:openai-api-key

  mobile-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"

      - name: Clean Flutter build and cache
        working-directory: Codigo/apps/mobile
        run: |
          flutter clean
          flutter pub cache repair

      - name: Get dependencies
        working-directory: Codigo/apps/mobile
        run: flutter pub get

      - name: Build APK
        working-directory: Codigo/apps/mobile
        run: flutter build apk --release

      - name: Sanitize branch name
        id: sanitize
        shell: bash
        run: |
          branch_name="${GITHUB_REF_NAME//\//-}"
          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderats-apk-${{ steps.sanitize.outputs.branch_name }}
          path: Codigo/apps/mobile/build/app/outputs/flutter-apk/app-release.apk

  mobile-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"

      - name: Get dependencies
        working-directory: Codigo/apps/mobile
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: Codigo/apps/mobile/ios
        run: pod install --repo-update

      - name: Build iOS IPA without code signing
        working-directory: Codigo/apps/mobile
        run: flutter build ipa --release --no-codesign

      - name: Create unsigned IPA from archive
        working-directory: Codigo/apps/mobile
        run: |
          rm -rf build/ios/Payload
          mkdir -p build/ios/ipa
          mkdir build/ios/Payload
          cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/Payload/
          cd build/ios
          /usr/bin/zip -r ipa/Runner.ipa Payload

      - name: Sanitize branch name
        id: sanitize
        shell: bash
        run: |
          branch_name="${GITHUB_REF_NAME//\//-}"
          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderats-ipa-${{ steps.sanitize.outputs.branch_name }}
          path: Codigo/apps/mobile/build/ios/ipa/*.ipa
          if-no-files-found: error

  web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"

      - name: Get dependencies
        working-directory: Codigo/apps/mobile
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: Codigo/apps/mobile
        run: flutter build web --release

      - name: Sanitize branch name
        id: sanitize
        shell: bash
        run: |
          branch_name="${GITHUB_REF_NAME//\//-}"
          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderats-web-${{ steps.sanitize.outputs.branch_name }}
          path: Codigo/apps/mobile/build/web
