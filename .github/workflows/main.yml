name: Coderats CI/CD

on:
  push:
    branches:
      - main
      - development
      - 'feature/**'

jobs:
  # ------------------------------------------------------------
  # 1. Backend — Build & Push Docker Image (sempre Conta 1)
  # ------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (Conta 1 - ECR)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Export backend env vars
        run: |
          echo "ECR_REPO_API=${{ vars.ECR_REPO_API }}" >> $GITHUB_ENV

      - name: Define tag (prod/staging)
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend image
        run: |
          echo "📦 Buildando e enviando imagem do backend..."
          docker build -t $ECR_REPO_API:${{ steps.meta.outputs.tag }} ./Codigo/apps/backend
          docker push $ECR_REPO_API:${{ steps.meta.outputs.tag }}

  # ------------------------------------------------------------
  # 2. Mobile — Build APK (depende do backend)
  # ------------------------------------------------------------
  mobile:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"

      - name: Clean Flutter build and cache
        working-directory: Codigo/apps/mobile
        run: |
          flutter clean
          flutter pub cache repair

      - name: Get dependencies
        working-directory: Codigo/apps/mobile
        run: flutter pub get

      - name: Build APK
        working-directory: Codigo/apps/mobile
        run: flutter build apk --release

      - name: Sanitize branch name
        id: sanitize
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderats-apk-${{ steps.sanitize.outputs.branch_name }}
          path: Codigo/apps/mobile/build/app/outputs/flutter-apk/app-release.apk

  # ------------------------------------------------------------
  # 3. Web — Build (Flutter) e Deploy no S3
  #    - main      -> Conta 2 (prod)
  #    - dev/feat  -> Conta 1 (dev/staging)
  # ------------------------------------------------------------
  web:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"

      - name: Get dependencies
        working-directory: Codigo/apps/mobile
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: Codigo/apps/mobile
        run: flutter build web --release

      # Credenciais Conta 1 — usadas em development + feature/**
      - name: Configure AWS credentials (Conta 1 - dev/staging)
        if: github.ref_name == 'development' || startsWith(github.ref, 'refs/heads/feature/')
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Credenciais Conta 2 — usadas em main
      - name: Configure AWS credentials (Conta 2 - prod)
        if: github.ref_name == 'main'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS2_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION_ACCOUNT2 }}

      - name: Deploy Web to S3 (main - Conta 2)
        if: github.ref_name == 'main'
        run: |
          echo "🚀 Publicando versão WEB em PRODUÇÃO (Conta 2 - S3_BUCKET_WEB_PROD_ACCOUNT2)"
          aws s3 sync Codigo/apps/mobile/build/web s3://${{ vars.S3_BUCKET_WEB_PROD_ACCOUNT2 }} --delete

      - name: Deploy Web to S3 (development - Conta 1)
        if: github.ref_name == 'development'
        run: |
          echo "🚧 Publicando versão WEB em DEVELOPMENT (Conta 1 - S3_BUCKET_WEB_DEVELOP)"
          aws s3 sync Codigo/apps/mobile/build/web s3://${{ vars.S3_BUCKET_WEB_DEVELOP }} --delete

      - name: Deploy Web to S3 (feature to staging - Conta 1)
        if: startsWith(github.ref, 'refs/heads/feature/')
        run: |
          echo "🚧 Publicando versão WEB em STAGING (Conta 1 - S3_BUCKET_WEB_STAGING)"
          aws s3 sync Codigo/apps/mobile/build/web s3://${{ vars.S3_BUCKET_WEB_STAGING }} --delete

  # ------------------------------------------------------------
  # 4. Deploy Backend to EC2 (ASG)
  #    - main       -> Conta 2 (prod)
  #    - development-> Conta 1 (staging)
  # ------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref_name == 'main' || github.ref_name == 'development' || startsWith(github.ref, 'refs/heads/feature/')
    steps:
      # Credenciais Conta 1 — usadas em development
      - name: Configure AWS credentials (Conta 1 - staging)
        if: github.ref_name == 'development' || startsWith(github.ref, 'refs/heads/feature/')
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      # Credenciais Conta 2 — usadas em main
      - name: Configure AWS credentials (Conta 2 - prod)
        if: github.ref_name == 'main'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id:     ${{ secrets.AWS2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS2_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION_ACCOUNT2 }}

      - name: Trigger ASG refresh
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            ASG_NAME="${{ vars.ASG_NAME_PROD_ACCOUNT2 }}"
            echo "🚀 Atualizando ambiente de PRODUÇÃO (Conta 2): $ASG_NAME"
            aws autoscaling start-instance-refresh \
             --region ${{ vars.AWS_REGION_ACCOUNT2}} \
             --auto-scaling-group-name "$ASG_NAME" \
             --preferences '{"MinHealthyPercentage":100,"InstanceWarmup":120}'
          else
            ASG_NAME="${{ vars.ASG_NAME_STAGING }}"
            echo "🚧 Atualizando ambiente de STAGING (Conta 1): $ASG_NAME"
            aws autoscaling start-instance-refresh \
             --region ${{ vars.AWS_REGION }} \
             --auto-scaling-group-name "$ASG_NAME" \
             --preferences '{"MinHealthyPercentage":100,"InstanceWarmup":120}'
          fi

          
