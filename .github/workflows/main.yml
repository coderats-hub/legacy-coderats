name: Coderats CI/CD

on:
  push:
    branches:
      - main
      - development
      - 'feature/**'

env:
  AWS_REGION: us-east-2
  ECR_REPO_API: 960596859173.dkr.ecr.us-east-2.amazonaws.com/coderats-project/coderats-api
  ECR_REPO_MOBILE: 960596859173.dkr.ecr.us-east-2.amazonaws.com/coderats-project/docker-android
  S3_BUCKET_WEB_PROD: coderats-web-prod
  S3_BUCKET_WEB_STAGING: coderats-web-staging

jobs:
  # ------------------------------------------------------------
  # 1. Backend — Build & Push Docker Image
  # ------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Define tag (prod/staging)
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend image
        run: |
          echo "📦 Buildando e enviando imagem do backend..."
          docker build -t $ECR_REPO_API:${{ steps.meta.outputs.tag }} ./Codigo/apps/backend
          docker push $ECR_REPO_API:${{ steps.meta.outputs.tag }}

   # ------------------------------------------------------------
  # 2. Mobile — Build APK (depende do backend)
  # ------------------------------------------------------------
  mobile:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"

      - name: Clean Flutter build and cache
        working-directory: Codigo/apps/mobile
        run: |
          flutter clean
          flutter pub cache repair

      - name: Get dependencies
        working-directory: Codigo/apps/mobile
        run: flutter pub get

      - name: Build APK
        working-directory: Codigo/apps/mobile
        run: flutter build apk --release

      - name: Sanitize branch name
        id: sanitize
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderats-apk-${{ steps.sanitize.outputs.branch_name }}
          path: Codigo/apps/mobile/build/app/outputs/flutter-apk/app-release.apk

  # ------------------------------------------------------------
  # 3. Web — Build (com Flutter) e Deploy no S3
  # ------------------------------------------------------------
  web:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"

      - name: Get dependencies
        working-directory: Codigo/apps/mobile
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: Codigo/apps/mobile
        run: flutter build web --release

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Web to S3
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "🚀 Publicando versão WEB em PRODUÇÃO (S3_BUCKET_WEB_PROD)"
            aws s3 sync Codigo/apps/mobile/build/web s3://$S3_BUCKET_WEB_PROD --delete
          else
            echo "🚧 Publicando versão WEB em STAGING (S3_BUCKET_WEB_STAGING)"
            aws s3 sync Codigo/apps/mobile/build/web s3://$S3_BUCKET_WEB_STAGING --delete

  # ------------------------------------------------------------
  # 4. Deploy Backend to EC2 (ASG)
  # ------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref_name == 'main' || github.ref_name == 'development'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Trigger ASG refresh
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            ASG_NAME="${{ vars.ASG_NAME_PROD }}"
            echo "🚀 Atualizando ambiente de PRODUÇÃO: $ASG_NAME"
          else
            ASG_NAME="${{ vars.ASG_NAME_STAGING }}"
            echo "🚧 Atualizando ambiente de STAGING: $ASG_NAME"
          fi

          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage":100,"InstanceWarmup":120}'
