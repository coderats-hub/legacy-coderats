name: CodeRats Azure CI/CD

on:
  push:
    branches:
      - main
      - development
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-coderats-dev' }}
  AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME || 'crcoderatsdevgug01' }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'ca-coderats-dev-backend' }}
  BACKEND_IMAGE_NAME: coderats-backend
  BASE_API_URL: ${{ vars.BASE_API_URL || 'https://ca-coderats-dev-backend.redocean-3abdf16b.eastus.azurecontainerapps.io' }}
  CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS || 'http://localhost:8082,http://localhost:8081,http://localhost:8080,https://stcoderatsdevgug01.z13.web.core.windows.net' }}
  OAUTH_CLIENT_ID_DEV: ${{ vars.OAUTH_CLIENT_ID_DEV || '' }}
  OAUTH_REDIRECT_URI_DEV: ${{ vars.OAUTH_REDIRECT_URI_DEV || 'https://ca-coderats-dev-backend.redocean-3abdf16b.eastus.azurecontainerapps.io/auth/github/callback' }}

jobs:
  backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Define image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            env_tag="prod"
          elif [[ "${GITHUB_REF_NAME}" == "development" ]]; then
            env_tag="dev"
          else
            env_tag="staging"
          fi

          echo "tag=${env_tag}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "alias=${env_tag}" >> "$GITHUB_OUTPUT"

      - name: Resolve ACR login server
        id: acr
        shell: bash
        run: |
          set -euo pipefail
          login_server="$(az acr show \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_ACR_NAME}" \
            --query loginServer \
            --output tsv)"
          echo "login_server=${login_server}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        shell: bash
        env:
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${ACR_PASSWORD:-}" ]] && echo "${ACR_PASSWORD}" | docker login "${{ steps.acr.outputs.login_server }}" -u "${AZURE_ACR_NAME}" --password-stdin; then
            echo "Authenticated to ACR with ACR_PASSWORD."
          else
            echo "ACR_PASSWORD login failed. Falling back to az acr login."
            az acr login --name "${AZURE_ACR_NAME}"
          fi

      - name: Build and push backend image
        id: image
        shell: bash
        run: |
          set -euo pipefail

          image="${{ steps.acr.outputs.login_server }}/${BACKEND_IMAGE_NAME}:${{ steps.meta.outputs.tag }}"
          alias_image="${{ steps.acr.outputs.login_server }}/${BACKEND_IMAGE_NAME}:${{ steps.meta.outputs.alias }}"

          docker build \
            -f Codigo/apps/backend/Dockerfile \
            -t "${image}" \
            -t "${alias_image}" \
            Codigo/apps/backend

          docker push "${image}"
          docker push "${alias_image}"

          echo "image=${image}" >> "$GITHUB_OUTPUT"


  start-postgres:
    name: Start PostgreSQL for Deploy
    needs: backend
    if: github.ref_name == 'main' || github.ref_name == 'development' || startsWith(github.ref, 'refs/heads/feature/')
    uses: ./.github/workflows/azure-postgres-scheduler.yml
    with:
      action: start
      keep_running_minutes: 120
    secrets: inherit

  deploy-backend:
    name: Deploy Backend to Azure Container Apps
    runs-on: ubuntu-latest
    needs:
      - backend
      - start-postgres
    if: github.ref_name == 'main' || github.ref_name == 'development' || startsWith(github.ref, 'refs/heads/feature/')
    env:
      DB_PASS: ${{ secrets.DB_PASS }}
      SECURITY_JWT_SECRET: ${{ secrets.SECURITY_JWT_SECRET }}
      OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_SYSTEM_PROMPT: ${{ secrets.OPENAI_SYSTEM_PROMPT }}
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT || 'coderatsdevstorage' }}
      AZURE_STORAGE_CONTAINER: ${{ vars.AZURE_STORAGE_CONTAINER || 'coderats-images' }}
      AZURE_STORAGE_BASE_PATH: ${{ vars.AZURE_STORAGE_BASE_PATH || 'public/images/' }}
      AZURE_STORAGE_PUBLIC_BASE_URL: ${{ vars.AZURE_STORAGE_PUBLIC_BASE_URL || 'https://coderatsdevstorage.blob.core.windows.net/coderats-images/' }}
      AZURE_POSTGRES_SERVER: ${{ vars.AZURE_POSTGRES_SERVER || 'psql-coderats-dev-gug04' }}
      POSTGRES_DATABASE_NAME: ${{ vars.POSTGRES_DATABASE_NAME || 'coderats_db' }}
      POSTGRES_ADMIN_USERNAME: ${{ vars.POSTGRES_ADMIN_USERNAME || 'coderats_admin' }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in DB_PASS SECURITY_JWT_SECRET OAUTH_CLIENT_SECRET OPENAI_API_KEY OPENAI_SYSTEM_PROMPT AZURE_STORAGE_CONNECTION_STRING; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Configure Container App secrets
        shell: bash
        run: |
          set -euo pipefail

          az containerapp secret set \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --secrets \
              db-pass="${DB_PASS}" \
              security-jwt-secret="${SECURITY_JWT_SECRET}" \
              github-oauth-client-secret="${OAUTH_CLIENT_SECRET}" \
              openai-api-key="${OPENAI_API_KEY}" \
              openai-system-prompt="${OPENAI_SYSTEM_PROMPT}" \
              azure-storage-connection-string="${AZURE_STORAGE_CONNECTION_STRING}" \
            --output none

      - name: Set Container App registry
        shell: bash
        env:
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          set -euo pipefail
          login_server=$(az acr show --name "$AZURE_ACR_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query loginServer -o tsv)
          if az containerapp registry set \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server "$login_server" \
            --identity system; then
            echo "Configured Container App registry with managed identity."
          else
            echo "Managed identity registry setup failed. Falling back to ACR_PASSWORD."
            az containerapp registry set \
              --name "$AZURE_CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --server "$login_server" \
              --username "$AZURE_ACR_NAME" \
              --password "$ACR_PASSWORD"
          fi

      - name: Deploy image to Container App
        shell: bash
        run: |
          set -euo pipefail

          db_url="jdbc:postgresql://${AZURE_POSTGRES_SERVER}.postgres.database.azure.com:5432/${POSTGRES_DATABASE_NAME}?sslmode=require"

          if [[ "${POSTGRES_ADMIN_USERNAME}" == *"@"* ]]; then
            echo "::error::POSTGRES_ADMIN_USERNAME must be the Flexible Server login only, for example 'coderats_admin'. Do not use 'user@server'."
            exit 1
          fi

          az containerapp update \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --image "${{ needs.backend.outputs.image }}" \
            --set-env-vars \
              DB_URL="${db_url}" \
              DB_USER="${POSTGRES_ADMIN_USERNAME}" \
              DB_PASS=secretref:db-pass \
              SECURITY_JWT_SECRET=secretref:security-jwt-secret \
              OAUTH_CLIENT_ID_DEV="${OAUTH_CLIENT_ID_DEV}" \
              OAUTH_REDIRECT_URI_DEV="${OAUTH_REDIRECT_URI_DEV}" \
              OAUTH_CLIENT_SECRET_DEV=secretref:github-oauth-client-secret \
              OAUTH_CLIENT_SECRET_PROD=secretref:github-oauth-client-secret \
              OPENAI_API_KEY=secretref:openai-api-key \
              OPENAI_SYSTEM_PROMPT=secretref:openai-system-prompt \
              AZURE_STORAGE_CONNECTION_STRING=secretref:azure-storage-connection-string \
              AZURE_STORAGE_ACCOUNT="${AZURE_STORAGE_ACCOUNT}" \
              AZURE_STORAGE_CONTAINER="${AZURE_STORAGE_CONTAINER}" \
              AZURE_STORAGE_BASE_PATH="${AZURE_STORAGE_BASE_PATH}" \
              AZURE_STORAGE_PUBLIC_BASE_URL="${AZURE_STORAGE_PUBLIC_BASE_URL}" \
              CORS_ALLOWED_ORIGINS="${CORS_ALLOWED_ORIGINS}"

  mobile-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"

      - name: Clean Flutter build and cache
        working-directory: Codigo/apps/mobile
        run: |
          flutter clean
          flutter pub cache repair

      - name: Get dependencies
        working-directory: Codigo/apps/mobile
        run: flutter pub get

      - name: Build APK
        working-directory: Codigo/apps/mobile
        run: |
          flutter build apk --release
          flutter build apk --debug

      - name: Validate APK files
        working-directory: Codigo/apps/mobile
        shell: bash
        run: |
          set -euo pipefail
          APKSIGNER_BIN="$(command -v apksigner || true)"
          if [[ -z "$APKSIGNER_BIN" ]]; then
            APKSIGNER_BIN="$(find "${ANDROID_HOME:-/usr/local/lib/android/sdk}" -type f -name apksigner | sort | tail -n1)"
          fi
          if [[ -z "$APKSIGNER_BIN" ]]; then
            echo "::error::apksigner not found on runner."
            exit 1
          fi
          ls -lh build/app/outputs/flutter-apk/
          unzip -t build/app/outputs/flutter-apk/app-release.apk
          unzip -t build/app/outputs/flutter-apk/app-debug.apk
          "$APKSIGNER_BIN" verify --verbose --print-certs build/app/outputs/flutter-apk/app-release.apk
          "$APKSIGNER_BIN" verify --verbose --print-certs build/app/outputs/flutter-apk/app-debug.apk

      - name: Sanitize branch name
        id: sanitize
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderats-apk-${{ steps.sanitize.outputs.branch_name }}
          path: |
            Codigo/apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            Codigo/apps/mobile/build/app/outputs/flutter-apk/app-debug.apk

  mobile-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"

      - name: Get dependencies
        working-directory: Codigo/apps/mobile
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: Codigo/apps/mobile/ios
        run: pod install --repo-update

      - name: Build iOS IPA without code signing
        working-directory: Codigo/apps/mobile
        run: flutter build ipa --release --no-codesign

      - name: Create unsigned IPA from archive
        working-directory: Codigo/apps/mobile
        run: |
          rm -rf build/ios/Payload
          mkdir -p build/ios/ipa
          mkdir build/ios/Payload
          cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/Payload/
          cd build/ios
          /usr/bin/zip -r ipa/Runner.ipa Payload

      - name: Sanitize branch name
        id: sanitize
        shell: bash
        run: |
          branch_name="${GITHUB_REF_NAME//\//-}"
          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderats-ipa-${{ steps.sanitize.outputs.branch_name }}
          path: Codigo/apps/mobile/build/ios/ipa/*.ipa
          if-no-files-found: error

  web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    needs: backend
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-coderats-dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"

      - name: Get dependencies
        working-directory: Codigo/apps/mobile
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: Codigo/apps/mobile
        run: |
          flutter build web --release \
            --dart-define=BASE_API_URL="${BASE_API_URL}"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve storage account for static website
        id: storage
        shell: bash
        run: |
          set -euo pipefail
          storage_account=$(az storage account list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "[?primaryEndpoints.web != null] | [0].name" \
            -o tsv)
          if [[ -z "${storage_account}" ]]; then
            echo "::error::No Storage Account with static website endpoint found in ${AZURE_RESOURCE_GROUP}."
            exit 1
          fi
          echo "name=${storage_account}" >> "$GITHUB_OUTPUT"

      - name: Publish Flutter Web to Azure Storage static website
        shell: bash
        run: |
          set -euo pipefail
          connection_string=$(az storage account show-connection-string \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "${{ steps.storage.outputs.name }}" \
            -o tsv)
          az storage blob upload-batch \
            --source Codigo/apps/mobile/build/web \
            --destination '$web' \
            --account-name "${{ steps.storage.outputs.name }}" \
            --connection-string "$connection_string" \
            --overwrite
          web_url=$(az storage account show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "${{ steps.storage.outputs.name }}" \
            --query "primaryEndpoints.web" -o tsv)
          echo "Web published to: ${web_url}"

      - name: Sanitize branch name
        id: sanitize
        shell: bash
        run: |
          branch_name="${GITHUB_REF_NAME//\//-}"
          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderats-web-${{ steps.sanitize.outputs.branch_name }}
          path: Codigo/apps/mobile/build/web
