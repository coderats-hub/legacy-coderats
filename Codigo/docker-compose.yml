

services:
  backend:
    build: ./apps/backend
    container_name: coderats-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/coderats_db
      SPRING_DATASOURCE_USERNAME: coderats_user
      SPRING_DATASOURCE_PASSWORD: coderats_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
    tty: true

  postgres:
    image: postgres:16.3-alpine
    container_name: coderats-postgres
    environment:
      POSTGRES_DB: coderats_db
      POSTGRES_USER: coderats_user
      POSTGRES_PASSWORD: coderats_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U coderats_user -d coderats_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mobile:
    build: ./apps/mobile
    container_name: coderats-mobile
    ports:
      - "8081:8080"
    restart: unless-stopped

  mobile-dev:
    image: ghcr.io/cirruslabs/flutter:3.24.3
    container_name: coderats-mobile-dev
    working_dir: /src
    volumes:
      - ./apps/mobile:/src
    entrypoint: ["/bin/bash", "-lc"]
    command: "./scripts/dev-web.sh"
    ports:
      - "8082:8080"
    stdin_open: true
    tty: true

volumes:
  postgres-data:
