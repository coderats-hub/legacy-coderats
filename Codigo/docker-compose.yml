

services:
  db:
    image: postgres:16
    container_name: coderats_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 15

  pgadmin:
    image: dpage/pgadmin4
    container_name: coderats_pgadmin
    platform: linux/amd64
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin:/var/lib/pgadmin

  backend:
    build: ./apps/backend
    container_name: coderats_backend
    env_file:
      - ./.env 
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:8082,http://localhost:8080}
    ports:
      - "${APP_PORT}:8080"

  mobile:
    build:
      context: ./apps/mobile
      args:
        BASE_API_URL: ${BASE_API_URL:-http://localhost:8080}
        USE_MOCK_API: ${USE_MOCK_API:-false}
    container_name: coderats-mobile
    ports:
      - "8081:8080"
    restart: unless-stopped

  mobile-dev:
    image: ghcr.io/cirruslabs/flutter:3.24.3
    container_name: coderats-mobile-dev
    working_dir: /src
    volumes:
      - ./apps/mobile:/src
    entrypoint: ["/bin/bash", "-lc"]
    command: "./scripts/dev-web.sh"
    ports:
      - "8082:8080"
    stdin_open: true
    tty: true

volumes:
  pgdata:
  pgadmin:
