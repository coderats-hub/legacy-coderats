openapi: 3.0.3
info:
  title: Code Rats API
  description: |-
    API social e gamificada para desenvolvedores acompanharem seu progresso de estudos.
    Análoga ao conceito de "Gym Rats", mas para o mundo do código.
  version: 1.2.0
servers:
  - url: https://virtserver.swaggerhub.com/coderats/code-rats-api/1.2.0
    description: Servidor de Mock

tags:
  - name: Autenticação
    description: Endpoints para registro e login de usuários.
  - name: Usuários
    description: Operações relacionadas aos perfis dos usuários.
  - name: Grupos
    description: Gerenciamento de grupos de estudo e desafios.
  - name: Check-ins
    description: Operações para registrar e visualizar o progresso dos usuários.
  - name: Badges
    description: Visualização de badges e conquistas.

paths:
  # =============================================
  # Autenticação
  # =============================================
  /auth/register:
    post:
      tags:
        - Autenticação
      summary: Registrar um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: Usuário criado com sucesso. Retorna o objeto do usuário e o token JWT.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/PrivateUserProfile'
                  token:
                    type: string
              example:
                user:
                  id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                  name: "Ana Coder"
                  email: "ana.coder@email.com"
                  image: "https://example.com/path/to/image.png"
                  github_user: "anacoder"
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJhMWIyYzNkNC1lNWY2LTc4OTAtMTIzNC01Njc4OTBhYmNkZWYifQ.token"
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/login:
    post:
      tags:
        - Autenticação
      summary: Autenticar um usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Login bem-sucedido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/PrivateUserProfile'
                  token:
                    type: string
              example:
                user:
                  id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                  name: "Ana Coder"
                  email: "ana.coder@email.com"
                  image: "https://example.com/path/to/image.png"
                  github_user: "anacoder"
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJhMWIyYzNkNC1lNWY2LTc4OTAtMTIzNC01Njc4OTBhYmNkZWYifQ.token"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # =============================================
  # Usuários (/me)
  # =============================================
  /users/me:
    get:
      tags:
        - Usuários
      summary: Obter meu perfil
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil do usuário autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserProfile'
              example:
                id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                name: "Ana Coder"
                email: "ana.coder@email.com"
                image: "https://example.com/path/to/image.png"
                github_user: "anacoder"
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags:
        - Usuários
      summary: Atualizar meu perfil
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Perfil atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserProfile'
              example:
                id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                name: "Ana Coder Silva"
                email: "ana.coder@email.com"
                image: "https://example.com/path/to/new_image.png"
                github_user: "anacodersilva"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
          
  /users/me/groups:
    get:
      tags:
        - Grupos
      summary: Listar meus grupos com detalhes
      description: Retorna uma lista paginada dos grupos que eu participo, incluindo uma prévia dos participantes e dos check-ins recentes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista de grupos do usuário com detalhes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupWithDetails'
              example:
                - id: "group-uuid-abc"
                  name: "Desafio 30 Dias de Testes"
                  description: "Grupo para focar em TDD e testes unitários."
                  repository: "https://github.com/coderats/desafio-testes"
                  method: "streak_images"
                  status: true
                  start_date: "2025-09-01T00:00:00Z"
                  end_date: "2025-09-30T23:59:59Z"
                  participants:
                    - id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                      name: "Ana Coder"
                      image: "https://example.com/path/to/ana_image.png"
                    - id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                      name: "Beto Debugger"
                      image: "https://example.com/path/to/beto_image.png"
                  recent_checkins:
                    - id: "checkin-uuid-123"
                      title: "Dia 15: Refatorando a API de pagamentos"
                      createdAt: "2025-09-25T22:10:00Z"
                      author:
                        id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                        name: "Beto Debugger"
                        image: "https://example.com/path/to/beto_image.png"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/badges:
    get:
      tags:
        - Badges
      summary: Listar minhas badges
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de badges que eu conquistei.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Badge'
              example:
                - id: "badge-uuid-01"
                  name: "Rato Iniciante"
                  image: "https://cdn.coderats.com/badges/rato-iniciante.svg"
                  points: 50
                  description: "Realizou seu primeiro check-in!"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}:
    get:
      tags:
        - Usuários
      summary: Obter perfil público de um usuário e grupos em comum
      description: Retorna os detalhes públicos de um usuário específico, além de uma lista dos grupos que vocês dois participam.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: O ID do usuário a ser consultado.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Perfil público do usuário com a lista de grupos em comum.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserProfileWithGroups'
              example:
                profile:
                  id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                  name: "Beto Debugger"
                  image: "https://example.com/path/to/beto_image.png"
                  github_user: "betodebugger"
                  points: 2300
                common_groups:
                  - id: "group-uuid-abc"
                    name: "Desafio 30 Dias de Testes"
                  - id: "group-uuid-xyz"
                    name: "Estudantes de Arquitetura de Software"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # =============================================
  # Feed
  # =============================================
  # Atualize a rota /feed em 'paths'

  /feed:
    get:
      tags:
        - Check-ins
      summary: Obter meu feed principal
      description: Retorna uma lista paginada de check-ins de todos os grupos que eu participo.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista de check-ins do feed.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Checkin'
              example:
                - id: "checkin-uuid-123"
                  title: "Dia 15: Refatorando a API de pagamentos"
                  description: "Apliquei o padrão Strategy para os gateways de pagamento. O código ficou bem mais limpo e fácil de manter, separando cada lógica de pagamento em sua própria classe. O próximo passo é adicionar testes de integração."
                  picture: "https://example.com/screenshots/refactoring.png"
                  summary_ai: "Excelente aplicação do padrão Strategy! Separar as responsabilidades torna o código mais escalável e manutenível, o que é uma prática de um desenvolvedor sênior. Adicionar testes de integração é o caminho certo para garantir a robustez da solução. Continue assim!"
                  points: 150
                  createdAt: "2025-09-25T22:10:00Z"
                  author:
                    id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                    name: "Beto Debugger"
                    image: "https://example.com/path/to/beto_image.png"
                  likes_count: 25
                  liked_by_me: true
                  comments:
                    - id: "comment-uuid-xyz"
                      content: "Belo trabalho! O padrão Strategy é perfeito para isso. Você pensou em usar o padrão Factory para instanciar os gateways?"
                      creation_date: "2025-09-26T09:30:00Z"
                      author:
                        id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                        name: "Ana Coder"
                        image: "https://example.com/path/to/ana_image.png"
                    - id: "comment-uuid-abc"
                      content: "Muito bom! Isso vai facilitar muito a adição de novos métodos de pagamento no futuro."
                      creation_date: "2025-09-26T10:15:00Z"
                      author:
                        id: "c3d4e5f6-a7b8-9012-3456-7890abcdef12"
                        name: "Carla Scripter"
                        image: "https://example.com/path/to/carla_image.png"
        '401':
          $ref: '#/components/responses/Unauthorized'
  # =============================================
  # Grupos
  # =============================================
  /groups:
    post:
      tags:
        - Grupos
      summary: Criar um novo grupo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreate'
      responses:
        '201':
          description: Grupo criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                id: "group-uuid-def"
                name: "Estudando Elixir e Phoenix"
                description: "Grupo focado na linguagem Elixir e no framework Phoenix."
                repository: "https://github.com/coderats/elixir-phoenix"
                method: "streak_images"
                status: true
                start_date: "2025-10-01T00:00:00Z"
                end_date: null
        '400':
          $ref: '#/components/responses/BadRequest'
  /groups/{groupId}:
    get:
      tags:
        - Grupos
      summary: Detalhes de um grupo
      description: Retorna todas as informações de um grupo específico, incluindo a lista de seus participantes e os check-ins mais recentes.
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Detalhes do grupo com participantes e check-ins.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupWithDetails'
              example:
                id: "group-uuid-abc"
                name: "Desafio 30 Dias de Testes"
                description: "Grupo para focar em TDD e testes unitários."
                method: "streak_images"
                status: true
                repository: "https://github.com/coderats/desafio-testes"
                start_date: "2025-09-01T00:00:00Z"
                end_date: "2025-09-30T23:59:59Z"
                participants:
                  - id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                    name: "Ana Coder"
                    image: "https://example.com/path/to/ana_image.png"
                  - id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                    name: "Beto Debugger"
                    image: "https://example.com/path/to/beto_image.png"
                  - id: "c3d4e5f6-a7b8-9012-3456-7890abcdef12"
                    name: "Carla Scripter"
                    image: "https://example.com/path/to/carla_image.png"
                recent_checkins:
                  - id: "checkin-uuid-123"
                    title: "Dia 15: Refatorando a API de pagamentos"
                    createdAt: "2025-09-25T22:10:00Z"
                    author:
                      id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                      name: "Beto Debugger"
                      image: "https://example.com/path/to/beto_image.png"
                  - id: "checkin-uuid-456"
                    title: "Dia 14: Configurando ambiente com Docker"
                    createdAt: "2025-09-24T20:15:00Z"
                    author:
                      id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                      name: "Ana Coder"
                      image: "https://example.com/path/to/ana_image.png"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Grupos
      summary: Atualizar um grupo
      description: |-
        Permite a Atualizar do name, descrição e image de um grupo.
        Adicionalmente, permite remover um ou mais participantes através de uma lista de IDs. O usuário deve ser o administrador do grupo para realizar esta ação.
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupUpdate'
      responses:
        '200':
          description: Grupo atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupWithDetails' # Retorna o objeto completo para o cliente ver o resultado
              example:
                id: "group-uuid-abc"
                name: "Desafio 30 Dias de Testes (Avançado)"
                description: "Foco em TDD, BDD e testes de integração."
                image: "https://cdn.coderats.com/groups/new_cover.png"
                repository: "https://github.com/coderats/desafio-testes"
                method: "streak_images"
                status: true
                start_date: "2025-09-01T00:00:00Z"
                end_date: "2025-09-30T23:59:59Z"
                participants: # Exibe a lista de participantes atualizada (sem o usuário removido)
                  - id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                    name: "Ana Coder"
                    image: "https://example.com/path/to/ana_image.png"
                  - id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                    name: "Beto Debugger"
                    image: "https://example.com/path/to/beto_image.png"
                recent_checkins: [] # O backend retornaria os check-ins recentes aqui
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Grupos
      summary: Excluir um grupo
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Grupo excluído com sucesso.
        '403':
          $ref: '#/components/responses/Forbidden'
  # =============================================
  # Check-ins
  # =============================================
  /groups/{groupId}/checkins:
    post:
      tags:
        - Check-ins
      summary: Criar um novo check-in em um grupo
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckinCreate'
      responses:
        '201':
          description: Check-in criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Checkin'
              example:
                id: "checkin-uuid-789"
                title: "Finalizei o módulo de GenServer em Elixir"
                description: "Conceito poderoso para concorrência."
                picture: null
                summary_ai: "Hoje consegui implementar o fluxo completo de login, geração de token JWT e validação nas rotas protegidas."
                points: 150
                createdAt: "2025-09-26T11:00:00Z"
                author:
                  id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                  name: "Ana Coder"
                  image: "https://example.com/path/to/image.png"
                likes: []
                comments: []
        '404':
          $ref: '#/components/responses/NotFound'

  /checkins/{checkinId}/like:
    post:
      tags:
        - Check-ins
      summary: Curtir um check-in
      description: Adiciona a curtida do usuário autenticado a um check-in.
      security:
        - bearerAuth: []
      parameters:
        - name: checkinId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201':
          description: Check-in curtido com sucesso. Retorna o objeto da curtida criada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Like'
              example:
                id: "like-uuid-2"
                creation_date: "2025-09-26T11:02:15Z"
                author:
                  id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                  name: "Ana Coder"
                  image: "https://example.com/path/to/image.png"
        '409':
          description: Conflito. O usuário já curtiu este check-in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                statusCode: 409
                message: "Usuário já curtiu este check-in."
    delete:
      tags:
        - Check-ins
      summary: Descurtir um check-in
      description: Remove a curtida do usuário autenticado de um check-in.
      security:
        - bearerAuth: []
      parameters:
        - name: checkinId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Curtida removida com sucesso.
        '404':
          $ref: '#/components/responses/NotFound'

  /checkins/{checkinId}/likes:
    get:
      tags:
        - Check-ins
      summary: Listar as curtidas de um check-in
      parameters:
        - name: checkinId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista paginada de curtidas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Like'
              example:
                - id: "like-uuid-1"
                  creation_date: "2025-09-25T22:15:03Z"
                  author:
                    id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                    name: "Ana Coder"
                    image: "https://example.com/path/to/image.png"
        '404':
          $ref: '#/components/responses/NotFound'

  /checkins/{checkinId}/comments:
    post:
      tags:
        - Check-ins
      summary: Adicionar um comentário a um check-in
      security:
        - bearerAuth: []
      parameters:
        - name: checkinId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  example: "Excelente progresso! Continue assim."
      responses:
        '201':
          description: Comentário adicionado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
              example:
                id: "comment-uuid-xyz"
                content: "Excelente progresso! Continue assim."
                creation_date: "2025-09-26T11:05:00Z"
                author:
                  id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                  name: "Beto Debugger"
                  image: "https://example.com/path/to/beto_image.png"
        '404':
          $ref: '#/components/responses/NotFound'

  /checkins/{checkinId}/comments/{commentId}:
    delete:
      tags:
        - Check-ins
      summary: Excluir um comentário de um check-in
      security:
        - bearerAuth: []
      parameters:
        - name: checkinId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: commentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Comentário excluído.
        '403':
          $ref: '#/components/responses/Forbidden'
  # =============================================
  # Badges
  # =============================================
  /badges:
    get:
      tags:
        - Badges
      summary: Listar todas as badges disponíveis
      responses:
        '200':
          description: Lista de todas as badges.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Badge'
              example:
                - id: "badge-uuid-01"
                  name: "Rato Iniciante"
                  image: "https://cdn.coderats.com/badges/rato-iniciante.svg"
                  points: 50
                  description: "Realizou seu primeiro check-in!"
components:
  schemas:
    UserBase:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        image: { type: string, format: uri, nullable: true }
        github_user: { type: string, nullable: true }
    PublicUserProfile:
      allOf:
        - $ref: '#/components/schemas/UserBase'
    PrivateUserProfile:
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          properties:
            email: { type: string, format: email }
    UserSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        image: { type: string, format: uri, nullable: true }
    UserRegister:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: "João da Silva" }
        email: { type: string, format: email, example: "joao.silva@email.com" }
        password: { type: string, format: password, example: "s3nh@F0rt3" }
        github_user: { type: string, example: "joaodasilva" }
    UserUpdate:
      type: object
      properties:
        name: { type: string }
        image: { type: string, format: uri }
        github_user: { type: string }
    Group:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        image: {type: string }
        code: {type: string }
        method: {type: string}
        status: {type: boolean}
        description: { type: string }
        repository: { type: string, format: uri, nullable: true }
        start_date: { type: string, format: date-time }
        end_date: { type: string, format: date-time, nullable: true }
    GroupCreate:
      type: object
      required: [name, start_date, end_date]
      properties:
        name: { type: string, example: "Desafio 30 Dias de Testes" }
        image: {type: string, example: "https://cdn.coderats.com/group/rato-iniciante.svg" }
        description: { type: string, example: "Grupo para focar em TDD e testes unitários." }
        method: {type: string, example: "streak_images"}
        status: {type: boolean, example: true}
        repository: { type: string, format: uri, example: "https://github.com/coderats/desafio-testes" }
        start_date: { type: string, format: date-time }
        end_date: { type: string, format: date-time }
    GroupUpdate:
      type: object
      properties:
        name:
          type: string
          description: O novo nome do grupo.
          example: "Desafio 30 Dias de Testes (Avançado)"
        description:
          type: string
          description: A nova descrição do grupo.
          example: "Foco em TDD, BDD e testes de integração."
        image:
          type: string
          format: uri
          nullable: true
          description: A nova URL para a image de capa do grupo.
        status:
          type: boolean
          description: Atualiza o status do grupo
          example: false
        participants_remove:
          type: array
          description: Lista com os IDs dos participantes a serem removidos do grupo.
          items:
            type: string
            format: uuid
          example:
            - "c3d4e5f6-a7b8-9012-3456-7890abcdef12"
    Checkin:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string, nullable: true }
        picture: { type: string, format: uri, nullable: true }
        summary_ai: { type: string, nullable: true }
        points: { type: integer }
        createdAt: { type: string, format: date-time }
        author: { $ref: '#/components/schemas/UserSummary' }
        likes_count:
          type: integer
          description: "O número total de curtidas no check-in."
        liked_by_me:
          type: boolean
          description: "Indica se o usuário autenticado curtiu este check-in."
        comments:
          type: array
          description: "Pode ser uma lista parcial dos comentários mais recentes."
          items:
            $ref: '#/components/schemas/Comment'
    CheckinCreate:
      type: object
      required: [title]
      properties:
        title: { type: string, example: "Dia 05: Testes Unitários com Jest" }
        description: { type: string, example: "Foquei em mocks e spies." }
        picture: { type: string, format: uri }
        summary_ai: { type: string }
    Badge:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        image: { type: string, format: uri }
        points: { type: integer }
        description: { type: string }
    Comment:
      type: object
      properties:
        id: { type: string, format: uuid }
        content: { type: string }
        creation_date: { type: string, format: date-time }
        author: { $ref: '#/components/schemas/UserSummary' }
    Like:
      type: object
      properties:
        id: { type: string, format: uuid }
        creation_date: { type: string, format: date-time }
        author: { $ref: '#/components/schemas/UserSummary' }
    Error:
      type: object
      properties:
        statusCode: { type: integer }
        message: { type: string }
        details: { type: string, nullable: true }
    GroupSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "group-uuid-abc"
        name:
          type: string
          example: "Desafio 30 Dias de Testes"
        status:
          type: boolean
          example: true
    PublicUserProfileWithGroups:
      type: object
      properties:
        profile:
          $ref: '#/components/schemas/PublicUserProfile'
        common_groups:
          type: array
          description: Lista de grupos que este usuário e você (usuário autenticado) têm em comum.
          items:
            $ref: '#/components/schemas/GroupSummary'

    CheckinSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "checkin-uuid-abc"
        title:
          type: string
          example: "Dia 05: Testes Unitários com Jest"
        createdAt:
          type: string
          format: date-time
          example: "2025-09-26T11:00:00Z"
        author:
          $ref: '#/components/schemas/UserSummary'

    GroupWithDetails:
      allOf:
        - $ref: '#/components/schemas/Group'
        - type: object
          properties:
            participants:
              type: array
              description: Uma lista de membros do grupo.
              items:
                $ref: '#/components/schemas/UserSummary'
            recent_checkins:
              type: array
              description: Os check-ins mais recentes realizados neste grupo.
              items:
                $ref: '#/components/schemas/CheckinSummary'
                
  parameters:
    Limit:
      name: limit
      in: query
      description: Número máximo de itens a serem retornados.
      schema: { type: integer, default: 20 }
    Offset:
      name: offset
      in: query
      description: Número de itens a serem pulados para paginação.
      schema: { type: integer, default: 0 }
  responses:
    BadRequest:
      description: Requisição inválida.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            statusCode: 400
            message: "Erro de Validação"
            details: "O campo 'email' deve ser um email válido."
    Unauthorized:
      description: Não autorizado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            statusCode: 401
            message: "Token de autenticação não fornecido ou inválido."
    Forbidden:
      description: Acesso negado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            statusCode: 403
            message: "Acesso Negado"
            details: "Você não tem permissão para excluir este comentário."
    NotFound:
      description: Recurso não encontrado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            statusCode: 404
            message: "Recurso Não Encontrado"
            details: "O grupo com o ID 'group-uuid-nao-existe' não foi encontrado."
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Insira o token JWT com o prefixo 'Bearer ' (Ex: 'Bearer eyJhbG...')"
security:
  - bearerAuth: []