openapi: 3.0.3
info:
  title: Code Rats API
  description: |-
    API social e gamificada para desenvolvedores acompanharem seu progresso de estudos.
    Análoga ao conceito de "Gym Rats", mas para o mundo do código.
  version: 1.2.0
servers:
  - url: https://virtserver.swaggerhub.com/coderats/code-rats-api/1.2.0
    description: Servidor de Mock

tags:
  - name: Autenticação
    description: Endpoints para registro e login de usuários.
  - name: Usuários
    description: Operações relacionadas aos perfis dos usuários.
  - name: Grupos
    description: Gerenciamento de grupos de estudo e desafios.
  - name: Check-ins
    description: Operações para registrar e visualizar o progresso dos usuários.
  - name: Badges
    description: Visualização de badges e conquistas.

paths:
  # =============================================
  # Autenticação
  # =============================================
  /auth/register:
    post:
      tags:
        - Autenticação
      summary: Registrar um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: Usuário criado com sucesso. Retorna o objeto do usuário e o token JWT.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/PrivateUserProfile'
                  token:
                    type: string
              example:
                user:
                  id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                  nome: "Ana Coder"
                  email: "ana.coder@email.com"
                  imagem: "https://example.com/path/to/image.png"
                  user_github: "anacoder"
                  pontos: 0
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJhMWIyYzNkNC1lNWY2LTc4OTAtMTIzNC01Njc4OTBhYmNkZWYifQ.token"
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/login:
    post:
      tags:
        - Autenticação
      summary: Autenticar um usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, senha]
              properties:
                email: { type: string, format: email }
                senha: { type: string, format: password }
      responses:
        '200':
          description: Login bem-sucedido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/PrivateUserProfile'
                  token:
                    type: string
              example:
                user:
                  id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                  nome: "Ana Coder"
                  email: "ana.coder@email.com"
                  imagem: "https://example.com/path/to/image.png"
                  user_github: "anacoder"
                  pontos: 1500
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJhMWIyYzNkNC1lNWY2LTc4OTAtMTIzNC01Njc4OTBhYmNkZWYifQ.token"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # =============================================
  # Usuários (/me)
  # =============================================
  /users/me:
    get:
      tags:
        - Usuários
      summary: Obter meu perfil
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil do usuário autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserProfile'
              example:
                id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                nome: "Ana Coder"
                email: "ana.coder@email.com"
                imagem: "https://example.com/path/to/image.png"
                user_github: "anacoder"
                pontos: 1500
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags:
        - Usuários
      summary: Atualizar meu perfil
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Perfil atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserProfile'
              example:
                id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                nome: "Ana Coder Silva"
                email: "ana.coder@email.com"
                imagem: "https://example.com/path/to/new_image.png"
                user_github: "anacodersilva"
                pontos: 1500
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
          
  /users/me/groups:
    get:
      tags:
        - Grupos
      summary: Listar meus grupos
      description: Retorna uma lista paginada dos grupos que eu participo.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista de grupos do usuário.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
              example:
                - id: "group-uuid-abc"
                  nome: "Desafio 30 Dias de Testes"
                  descricao: "Grupo para focar em TDD e testes unitários."
                  repositorio: "https://github.com/coderats/desafio-testes"
                  data_inicio: "2025-09-01T00:00:00Z"
                  data_fim: "2025-09-30T23:59:59Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/badges:
    get:
      tags:
        - Badges
      summary: Listar minhas badges
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de badges que eu conquistei.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Badge'
              example:
                - id: "badge-uuid-01"
                  nome: "Rato Iniciante"
                  imagem: "https://cdn.coderats.com/badges/rato-iniciante.svg"
                  pontos: 50
                  descricao: "Realizou seu primeiro check-in!"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}:
    get:
      tags:
        - Usuários
      summary: Obter perfil público de um usuário
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Perfil público do usuário.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserProfile'
              example:
                id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                nome: "Beto Debugger"
                imagem: "https://example.com/path/to/beto_image.png"
                user_github: "betodebugger"
                pontos: 2300
        '404':
          $ref: '#/components/responses/NotFound'

  # =============================================
  # Feed
  # =============================================
  /feed:
    get:
      tags:
        - Check-ins
      summary: Obter meu feed principal
      description: Retorna uma lista paginada de check-ins de todos os grupos que eu participo.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista de check-ins do feed.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Checkin'
              example:
                - id: "checkin-uuid-123"
                  titulo: "Dia 15: Refatorando a API de pagamentos"
                  descricao: "Apliquei o padrão Strategy para os gateways de pagamento."
                  foto: "https://example.com/screenshots/refactoring.png"
                  avaliacao: 5
                  pontos: 150
                  createdAt: "2025-09-25T22:10:00Z"
                  author:
                    id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                    nome: "Beto Debugger"
                    imagem: "https://example.com/path/to/beto_image.png"
                  likes:
                    - id: "like-uuid-1"
                      data_criacao: "2025-09-25T22:15:03Z"
                      author:
                        id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                        nome: "Ana Coder"
                        imagem: "https://example.com/path/to/image.png"
                  comments: []
        '401':
          $ref: '#/components/responses/Unauthorized'
  # =============================================
  # Grupos
  # =============================================
  /groups:
    post:
      tags:
        - Grupos
      summary: Criar um novo grupo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreate'
      responses:
        '201':
          description: Grupo criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                id: "group-uuid-def"
                nome: "Estudando Elixir e Phoenix"
                descricao: "Grupo focado na linguagem Elixir e no framework Phoenix."
                repositorio: "https://github.com/coderats/elixir-phoenix"
                data_inicio: "2025-10-01T00:00:00Z"
                data_fim: null
        '400':
          $ref: '#/components/responses/BadRequest'
  /groups/{groupId}:
    get:
      tags:
        - Grupos
      summary: Obter detalhes de um grupo
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Detalhes do grupo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                id: "group-uuid-abc"
                nome: "Desafio 30 Dias de Testes"
                descricao: "Grupo para focar em TDD e testes unitários."
                repositorio: "https://github.com/coderats/desafio-testes"
                data_inicio: "2025-09-01T00:00:00Z"
                data_fim: "2025-09-30T23:59:59Z"
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Grupos
      summary: Atualizar um grupo
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreate'
      responses:
        '200':
          description: Grupo atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                id: "group-uuid-abc"
                nome: "Desafio 30 Dias de Testes (Avançado)"
                descricao: "Foco em TDD, BDD e testes de integração."
                repositorio: "https://github.com/coderats/desafio-testes-avancado"
                data_inicio: "2025-09-01T00:00:00Z"
                data_fim: "2025-09-30T23:59:59Z"
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags:
        - Grupos
      summary: Excluir um grupo
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Grupo excluído com sucesso.
        '403':
          $ref: '#/components/responses/Forbidden'
  # =============================================
  # Check-ins
  # =============================================
  /groups/{groupId}/checkins:
    post:
      tags:
        - Check-ins
      summary: Criar um novo check-in em um grupo
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckinCreate'
      responses:
        '201':
          description: Check-in criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Checkin'
              example:
                id: "checkin-uuid-789"
                titulo: "Finalizei o módulo de GenServer em Elixir"
                descricao: "Conceito poderoso para concorrência."
                foto: null
                avaliacao: 5
                pontos: 150
                createdAt: "2025-09-26T11:00:00Z"
                author:
                  id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                  nome: "Ana Coder"
                  imagem: "https://example.com/path/to/image.png"
                likes: []
                comments: []
        '404':
          $ref: '#/components/responses/NotFound'

  /checkins/{checkinId}/like:
    post:
      tags:
        - Check-ins
      summary: Curtir um check-in
      description: Adiciona a curtida do usuário autenticado a um check-in.
      security:
        - bearerAuth: []
      parameters:
        - name: checkinId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201':
          description: Check-in curtido com sucesso. Retorna o objeto da curtida criada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Like'
              example:
                id: "like-uuid-2"
                data_criacao: "2025-09-26T11:02:15Z"
                author:
                  id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                  nome: "Ana Coder"
                  imagem: "https://example.com/path/to/image.png"
        '409':
          description: Conflito. O usuário já curtiu este check-in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                statusCode: 409
                message: "Usuário já curtiu este check-in."
    delete:
      tags:
        - Check-ins
      summary: Descurtir um check-in
      description: Remove a curtida do usuário autenticado de um check-in.
      security:
        - bearerAuth: []
      parameters:
        - name: checkinId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Curtida removida com sucesso.
        '404':
          $ref: '#/components/responses/NotFound'

  /checkins/{checkinId}/likes:
    get:
      tags:
        - Check-ins
      summary: Listar as curtidas de um check-in
      parameters:
        - name: checkinId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista paginada de curtidas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Like'
              example:
                - id: "like-uuid-1"
                  data_criacao: "2025-09-25T22:15:03Z"
                  author:
                    id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                    nome: "Ana Coder"
                    imagem: "https://example.com/path/to/image.png"
        '404':
          $ref: '#/components/responses/NotFound'

  /checkins/{checkinId}/comments:
    post:
      tags:
        - Check-ins
      summary: Adicionar um comentário a um check-in
      security:
        - bearerAuth: []
      parameters:
        - name: checkinId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conteudo]
              properties:
                conteudo:
                  type: string
                  example: "Excelente progresso! Continue assim."
      responses:
        '201':
          description: Comentário adicionado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
              example:
                id: "comment-uuid-xyz"
                conteudo: "Excelente progresso! Continue assim."
                data_criacao: "2025-09-26T11:05:00Z"
                author:
                  id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                  nome: "Beto Debugger"
                  imagem: "https://example.com/path/to/beto_image.png"
        '404':
          $ref: '#/components/responses/NotFound'

  /checkins/{checkinId}/comments/{commentId}:
    delete:
      tags:
        - Check-ins
      summary: Excluir um comentário de um check-in
      security:
        - bearerAuth: []
      parameters:
        - name: checkinId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: commentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Comentário excluído.
        '403':
          $ref: '#/components/responses/Forbidden'
  # =============================================
  # Badges
  # =============================================
  /badges:
    get:
      tags:
        - Badges
      summary: Listar todas as badges disponíveis
      responses:
        '200':
          description: Lista de todas as badges.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Badge'
              example:
                - id: "badge-uuid-01"
                  nome: "Rato Iniciante"
                  imagem: "https://cdn.coderats.com/badges/rato-iniciante.svg"
                  pontos: 50
                  descricao: "Realizou seu primeiro check-in!"
components:
  schemas:
    UserBase:
      type: object
      properties:
        id: { type: string, format: uuid }
        nome: { type: string }
        imagem: { type: string, format: uri, nullable: true }
        user_github: { type: string, nullable: true }
        pontos: { type: integer }
    PublicUserProfile:
      allOf:
        - $ref: '#/components/schemas/UserBase'
    PrivateUserProfile:
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          properties:
            email: { type: string, format: email }
    UserSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        nome: { type: string }
        imagem: { type: string, format: uri, nullable: true }
    UserRegister:
      type: object
      required: [nome, email, senha]
      properties:
        nome: { type: string, example: "João da Silva" }
        email: { type: string, format: email, example: "joao.silva@email.com" }
        senha: { type: string, format: password, example: "s3nh@F0rt3" }
        user_github: { type: string, example: "joaodasilva" }
    UserUpdate:
      type: object
      properties:
        nome: { type: string }
        imagem: { type: string, format: uri }
        user_github: { type: string }
    Group:
      type: object
      properties:
        id: { type: string, format: uuid }
        nome: { type: string }
        descricao: { type: string }
        repositorio: { type: string, format: uri, nullable: true }
        data_inicio: { type: string, format: date-time }
        data_fim: { type: string, format: date-time, nullable: true }
    GroupCreate:
      type: object
      required: [nome, data_inicio]
      properties:
        nome: { type: string, example: "Desafio 30 Dias de Testes" }
        descricao: { type: string, example: "Grupo para focar em TDD e testes unitários." }
        repositorio: { type: string, format: uri, example: "https://github.com/coderats/desafio-testes" }
        data_inicio: { type: string, format: date-time }
        data_fim: { type: string, format: date-time }
    Checkin:
      type: object
      properties:
        id: { type: string, format: uuid }
        titulo: { type: string }
        descricao: { type: string, nullable: true }
        foto: { type: string, format: uri, nullable: true }
        avaliacao: { type: integer, minimum: 1, maximum: 5 }
        pontos: { type: integer }
        createdAt: { type: string, format: date-time }
        author: { $ref: '#/components/schemas/UserSummary' }
        likes:
          type: array
          description: "Pode ser uma lista parcial dos likes mais recentes."
          items:
            $ref: '#/components/schemas/Like'
        comments:
          type: array
          description: "Pode ser uma lista parcial dos comentários mais recentes."
          items:
            $ref: '#/components/schemas/Comment'
    CheckinCreate:
      type: object
      required: [titulo]
      properties:
        titulo: { type: string, example: "Dia 05: Testes Unitários com Jest" }
        descricao: { type: string, example: "Foquei em mocks e spies." }
        foto: { type: string, format: uri }
        avaliacao: { type: integer, minimum: 1, maximum: 5 }
    Badge:
      type: object
      properties:
        id: { type: string, format: uuid }
        nome: { type: string }
        imagem: { type: string, format: uri }
        pontos: { type: integer }
        descricao: { type: string }
    Comment:
      type: object
      properties:
        id: { type: string, format: uuid }
        conteudo: { type: string }
        data_criacao: { type: string, format: date-time }
        author: { $ref: '#/components/schemas/UserSummary' }
    Like:
      type: object
      properties:
        id: { type: string, format: uuid }
        data_criacao: { type: string, format: date-time }
        author: { $ref: '#/components/schemas/UserSummary' }
    Error:
      type: object
      properties:
        statusCode: { type: integer }
        message: { type: string }
        details: { type: string, nullable: true }
  parameters:
    Limit:
      name: limit
      in: query
      description: Número máximo de itens a serem retornados.
      schema: { type: integer, default: 20 }
    Offset:
      name: offset
      in: query
      description: Número de itens a serem pulados para paginação.
      schema: { type: integer, default: 0 }
  responses:
    BadRequest:
      description: Requisição inválida.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            statusCode: 400
            message: "Erro de Validação"
            details: "O campo 'email' deve ser um email válido."
    Unauthorized:
      description: Não autorizado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            statusCode: 401
            message: "Token de autenticação não fornecido ou inválido."
    Forbidden:
      description: Acesso negado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            statusCode: 403
            message: "Acesso Negado"
            details: "Você não tem permissão para excluir este comentário."
    NotFound:
      description: Recurso não encontrado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            statusCode: 404
            message: "Recurso Não Encontrado"
            details: "O grupo com o ID 'group-uuid-nao-existe' não foi encontrado."
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Insira o token JWT com o prefixo 'Bearer ' (Ex: 'Bearer eyJhbG...')"
security:
  - bearerAuth: []