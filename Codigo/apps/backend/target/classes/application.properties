spring.application.name=backend

# --- Datasource (com defaults que funcionam em Docker) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/coderats_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:coderats_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:coderats_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
