# --- DATASOURCE ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari (opcional, mas ajuda em dev)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# --- GitHub OAuth --- 
github.oauth.client-id=${GITHUB_OAUTH_CLIENT_ID_PROD}
github.oauth.client-secret=${GITHUB_OAUTH_CLIENT_SECRET_PROD}
github.oauth.redirect-uri=${GITHUB_OAUTH_REDIRECT_URI_PROD}

logging.level.dev.coderats.backend.service.GitHubCommitService=DEBUG
