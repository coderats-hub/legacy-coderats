logging.level.dev.coderats.backend.service.GitHubCommitService=DEBUG
logging.level.dev.coderats.backend.service.CommitEvaluationService=DEBUG

# --- DATASOURCE ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# --- GitHub OAuth ---
github.oauth.client-id=${GITHUB_OAUTH_CLIENT_ID_STAGING}
github.oauth.client-secret=${GITHUB_OAUTH_CLIENT_SECRET_STAGING}
github.oauth.redirect-uri=${GITHUB_OAUTH_REDIRECT_URI_STAGING}
