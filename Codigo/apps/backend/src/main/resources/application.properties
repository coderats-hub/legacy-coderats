server.port=${SERVER_PORT:8080}
spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/coderats_db}
spring.datasource.username=${DB_USER:coderats_user}
spring.datasource.password=${DB_PASS:coderats_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

security.jwt.secret=${SECURITY_JWT_SECRET}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:86400000}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui

# Rotas habilitadas do Cors
cors.allowed-origins=http://localhost:8082,http://localhost:8081,http://coderats-dev-alb-687982124.us-east-2.elb.amazonaws.com,http://coderats-web-estatico-dev.s3-website.us-east-2.amazonaws.com

# application.properties
spring.config.import=optional:file:.env[.properties]
logging.level.org.springframework.boot.context.config=DEBUG

aws.region=${AWS_REGION:us-east-2}
bedrock.agent.id=${BEDROCK_AGENT_ID:AAQOIDRFC4}
bedrock.agent.alias-id=${BEDROCK_AGENT_ALIAS_ID:DQGIMY5XSE}

logging.level.dev.coderats.backend.service.GitHubCommitService=DEBUG
