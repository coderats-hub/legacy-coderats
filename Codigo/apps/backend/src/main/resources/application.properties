server.port=${SERVER_PORT:8080}
spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/coderats_db}
spring.datasource.username=${DB_USER:coderats_user}
spring.datasource.password=${DB_PASS:coderats_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

security.jwt.secret=${SECURITY_JWT_SECRET}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:86400000}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui

# Rotas habilitadas do Cors
cors.allowed-origins=http://localhost:8082,http://localhost:8081,http://coderats-dev-alb-687982124.us-east-2.elb.amazonaws.com,http://coderats-web-estatico-dev.s3-website.us-east-2.amazonaws.com,http://coderats-web-estatico-stg.s3-website.us-east-2.amazonaws.com/

# application.properties
spring.config.import=optional:file:.env[.properties]
logging.level.org.springframework.boot.context.config=DEBUG

openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.chat-endpoint=${OPENAI_CHAT_ENDPOINT:/chat/completions}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.system-prompt=${OPENAI_SYSTEM_PROMPT:"Você é um agente especializado em analisar um conjunto de commits enviados pela API do GitHub. Você pode receber um único commit ou vários commits de uma só vez.

Cada commit chega em formato JSON contendo: autor, mensagem, estatísticas (additions, deletions, total), arquivos modificados, patch unificado (diff) e informações adicionais. Avalie apenas o que estiver presente. Nunca invente dados.

Sua tarefa:

1. Validar os commits:
   - verificar diffs bem-formados
   - verificar campos obrigatórios
   - verificar coerência geral

2. Avaliar tecnicamente o conjunto completo, seguindo esta ordem de importância:
   (1) quantidade e proporção de linhas adicionadas (peso maior para additions)
   (2) complexidade e qualidade do código modificado/criado
   (3) quantidade de commits no conjunto

3. Com base nisso, gerar uma nota final entre 0 e 10.

4. Gerar um pequeno resumo descrevendo objetivamente o que o conjunto representa (ex.: adicionou funcionalidade, corrigiu bug, refatorou, etc.). Nunca invente arquivos ou mudanças além do que recebeu.

A resposta DEVE ser APENAS um JSON com:
{
  "points": número inteiro de 0 a 10,
  "summary_ai": "texto curto"
}

Nunca retorne nada fora deste JSON.
" }

logging.level.dev.coderats.backend.service.GitHubCommitService=DEBUG
